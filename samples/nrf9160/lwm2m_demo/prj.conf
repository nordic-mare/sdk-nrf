# General config
CONFIG_NEWLIB_LIBC=y
CONFIG_ASSERT=y
CONFIG_REBOOT=y

# Network
CONFIG_NETWORKING=y
CONFIG_NET_NATIVE=n
CONFIG_NET_IPV6=n
CONFIG_NET_IPV4=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_OFFLOAD=y

# These two settings are needed due to a error in zephyrs lwm2m implementation.
# The error occurs when a multi instance resource is set to have a maximum of one instance.
# When the fix for this error is integrated, which it presumably will be in NCS 1.7,
# these settings can be safely removed. See zephyr PR #36657 for details.
CONFIG_NET_IF_MAX_IPV4_COUNT=2
CONFIG_LWM2M_CONN_MON_APN_MAX=2

# Sensors
CONFIG_I2C=y
CONFIG_SPI=y
CONFIG_SENSOR=y
CONFIG_NRF9160_GPS=y
CONFIG_ACCELEROMETER=y
CONFIG_ENVIRONMENT_SENSOR=y
CONFIG_LIGHT_SENSOR=y

# UI 
CONFIG_UI_BUTTON=y
CONFIG_UI_LED=y
CONFIG_UI_LOG_LEVEL_DBG=y

# LwM2M and IPSO
CONFIG_LWM2M=y
CONFIG_LWM2M_DNS_SUPPORT=y
CONFIG_LWM2M_RW_JSON_SUPPORT=n
CONFIG_LWM2M_SERVER_DEFAULT_PMIN=1
CONFIG_LWM2M_SERVER_DEFAULT_PMAX=300
CONFIG_LWM2M_CLIENT_UTILS=y
CONFIG_LWM2M_CLIENT_UTILS_LOCATION_OBJ_SUPPORT=n
CONFIG_LWM2M_IPSO_SUPPORT=y
CONFIG_LWM2M_IPSO_TEMP_SENSOR=y
CONFIG_LWM2M_IPSO_HUMIDITY_SENSOR=y
CONFIG_LWM2M_IPSO_PRESSURE_SENSOR=y
CONFIG_LWM2M_IPSO_GENERIC_SENSOR=y
CONFIG_LWM2M_IPSO_LIGHT_CONTROL=y
CONFIG_LWM2M_IPSO_PUSH_BUTTON=y
CONFIG_LWM2M_IPSO_ACCELEROMETER=y
CONFIG_LWM2M_IPSO_APP_BUZZER=y
CONFIG_LWM2M_IPSO_APP_COLOUR_SENSOR=y
CONFIG_LWM2M_IPSO_APP_COLOUR_SENSOR_INSTANCE_COUNT=2

# App LwM2M
CONFIG_LWM2M_APP_ACCELEROMETER=y
CONFIG_LWM2M_APP_PUSH_BUTTON=y
CONFIG_LWM2M_APP_ENVIRONMENT_SENSOR=y
CONFIG_LWM2M_APP_LIGHT_CONTROL=y
CONFIG_LWM2M_APP_LIGHT_SENSOR=y

# DTLS settings
CONFIG_LWM2M_DTLS_SUPPORT=y
CONFIG_LWM2M_PEER_PORT=5694
# nRF9160 helper libraries
CONFIG_MODEM_KEY_MGMT=y

# Default app to debug logging
CONFIG_LOG=y
CONFIG_APP_LOG_LEVEL_DBG=y

# Expand logging memory to avoid log_strdup() errors
CONFIG_LOG_STRDUP_MAX_STRING=64
CONFIG_LOG_STRDUP_BUF_COUNT=32

# Support HEX style PSK values (double the size + NULL char)
CONFIG_LWM2M_SECURITY_KEY_SIZE=33

# extend CoAP retry timing to 10 seconds for LTE/LTE-M
CONFIG_COAP_INIT_ACK_TIMEOUT_MS=10000

# Enable CoAP extended option length
CONFIG_COAP_EXTENDED_OPTIONS_LEN=y
CONFIG_COAP_EXTENDED_OPTIONS_LEN_VALUE=40

# FOTA
CONFIG_DFU_TARGET=y
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_IMG_MANAGER=y
CONFIG_MCUBOOT_IMG_MANAGER=y
CONFIG_IMG_ERASE_PROGRESSIVELY=y
CONFIG_FLASH=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y

# Enable settings storage
CONFIG_SETTINGS=y
CONFIG_FCB=y
CONFIG_SETTINGS_FCB=y

# LTE link control
CONFIG_LTE_LINK_CONTROL=y
CONFIG_LTE_AUTO_INIT_AND_CONNECT=n
CONFIG_LTE_NETWORK_MODE_LTE_M_GPS=y

# Modem library
CONFIG_NRF_MODEM_LIB=y

# Modem info
CONFIG_MODEM_INFO=y
CONFIG_MODEM_INFO_ADD_DATE_TIME=n

# Library for buttons and LEDs
CONFIG_DK_LIBRARY=y
CONFIG_DK_LIBRARY_INVERT_LEDS=n

# Enable shell
CONFIG_NET_SHELL=y

# Heap and stacks
CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# Temporarily disable CC310 entropy driver
CONFIG_ENTROPY_CC3XX=n
CONFIG_TEST_RANDOM_GENERATOR=y

# Set LwM2M Server IP address here
CONFIG_APP_LWM2M_SERVER="eu.iot.avsystem.cloud"

# Trace option. REMOVE WHEN DONE
CONFIG_NRF_MODEM_LIB_TRACE_ENABLED=y

# Event manager
CONFIG_EVENT_MANAGER=y
CONFIG_LINKER_ORPHAN_SECTION_PLACE=y

# Sensor module
CONFIG_SENSOR_MODULE_TEMP_STARTUP_DELAY=10000
CONFIG_SENSOR_MODULE_TEMP_DELAY=10000
CONFIG_SENSOR_MODULE_TEMP_DELTA_INT=0
CONFIG_SENSOR_MODULE_TEMP_DELTA_DEC=300000
CONFIG_SENSOR_MODULE_PRESS_STARTUP_DELAY=10000
CONFIG_SENSOR_MODULE_PRESS_DELAY=10000
CONFIG_SENSOR_MODULE_PRESS_DELTA_DEC=3000
CONFIG_SENSOR_MODULE_HUMID_STARTUP_DELAY=10000
CONFIG_SENSOR_MODULE_HUMID_DELAY=10000
CONFIG_SENSOR_MODULE_GAS_RES_STARTUP_DELAY=10000
CONFIG_SENSOR_MODULE_GAS_RES_DELAY=10000
CONFIG_SENSOR_MODULE_LIGHT_STARTUP_DELAY=10000
CONFIG_SENSOR_MODULE_LIGHT_DELAY=10000
CONFIG_SENSOR_MODULE_COLOUR_STARTUP_DELAY=10000
CONFIG_SENSOR_MODULE_COLOUR_DELAY=10000
